services:
  app:
    image: ghcr.io/aiuemon/kulip:0.1.2
    ports:
      - "3000:80"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://kulip:kulip@db:5432/kulip_production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kulip
      POSTGRES_PASSWORD: kulip
      POSTGRES_DB: kulip_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kulip -d kulip_production"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
