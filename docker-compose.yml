services:
  app:
    image: ghcr.io/aiuemon/kulip:0.1.32
    ports:
      - "3000:80"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://kulip:kulip@db:5432/kulip_production
      HTTP_MAX_REQUEST_BODY: "100000000"  # 100MB
      # RAILS_LOG_LEVEL: debug  # デバッグメッセージを表示する場合はコメント解除
      # WEBAUTHN_ORIGIN: https://example.com  # パスキー認証を使用する場合は本番URLを設定
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kulip
      POSTGRES_PASSWORD: kulip
      POSTGRES_DB: kulip_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kulip -d kulip_production"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
